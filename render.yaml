# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: balmores-strux-ai
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: BALMORES_BRAIN_PT
        sync: false
